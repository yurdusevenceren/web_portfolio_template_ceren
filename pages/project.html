
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>İşlemler — BudgetBuddy</title>
  <link rel="stylesheet" href="../assests/css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand"><a href="/index.html" style="display:flex;align-items:center;gap:.55rem"><span class="brand-icon">₺</span> BudgetBuddy</a></div>
  <ul class="nav-links">
    <li><a href="/index.html">Panel</a></li>
    <li><a href="project.html">İşlemler</a></li>
    <li><a href="about.html">Profil</a></li>
    <li><a href="contact.html">Destek</a></li>
    <li><a href="#" id="btn-cikis" class="nav-cta">Çıkış</a></li>
  </ul>
</nav>

<div class="page-wrap">

  <!-- Başlık -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2.5rem">
    <div>
      <h1 class="page-title">İşlemler</h1>
      <p class="page-sub" style="margin-bottom:0">Tüm gelir ve giderlerini yönet.</p>
    </div>
    <button class="btn btn-success" id="btn-ekle">+ Yeni İşlem</button>
  </div>

  <!-- Stat Kartları -->
  <div class="stat-row">
    <div class="stat-card">
      <span class="sc-lbl">Net Bakiye</span>
      <span class="sc-val" id="stat-bakiye">₺0,00</span>
    </div>
    <div class="stat-card">
      <span class="sc-lbl">Toplam Gelir</span>
      <span class="sc-val g" id="stat-gelir">₺0,00</span>
    </div>
    <div class="stat-card">
      <span class="sc-lbl">Toplam Gider</span>
      <span class="sc-val r" id="stat-gider">₺0,00</span>
    </div>
    <div class="stat-card">
      <span class="sc-lbl">İşlem Sayısı</span>
      <span class="sc-val p" id="stat-sayi">0</span>
    </div>
  </div>

  <!-- Filtreler -->
  <div class="card" style="margin-bottom:1.4rem;padding:1.2rem 1.6rem">
    <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end">
      <div class="form-group" style="margin:0;flex:1;min-width:160px">
        <label>Tür</label>
        <select id="filtre-tur">
          <option value="hepsi">Tümü</option>
          <option value="gelir">Sadece Gelir</option>
          <option value="gider">Sadece Gider</option>
        </select>
      </div>
      <div class="form-group" style="margin:0;flex:1;min-width:160px">
        <label>Kategori</label>
        <select id="filtre-kat">
          <option value="hepsi">Tümü</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Tablo -->
  <div class="card" style="padding:0;overflow:hidden">
    <table class="data-table">
      <thead>
        <tr>
          <th>Tarih</th>
          <th>Başlık</th>
          <th>Kategori</th>
          <th>Tutar</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tx-tbody">
        <tr><td colspan="5" style="text-align:center;padding:2.5rem;color:var(--text2)">Yükleniyor…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- MODAL: Yeni İşlem -->
<div class="modal-ov" id="m-islem">
  <div class="modal">
    <div class="modal-hd">
      <h3>Yeni İşlem Ekle</h3>
      <button class="modal-close" id="m-kapat">✕</button>
    </div>
    <form id="form-islem">
      <div class="form-row">
        <div class="form-group">
          <label>Tür</label>
          <select name="tur" required>
            <option value="gider">Gider</option>
            <option value="gelir">Gelir</option>
          </select>
        </div>
        <div class="form-group">
          <label>Kategori</label>
          <select name="category_id" id="form-kat">
            <option value="">— Seç —</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Başlık</label>
        <input type="text" name="baslik" placeholder="ör. Migros Alışveriş" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tutar (₺)</label>
          <input type="number" name="tutar" placeholder="0.00" min="0.01" step="0.01" required/>
        </div>
        <div class="form-group">
          <label>Tarih</label>
          <input type="date" name="tarih" id="islem-tarih" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Açıklama (isteğe bağlı)</label>
        <textarea name="aciklama" rows="2" placeholder="Kısa not…" style="resize:vertical"></textarea>
      </div>
      <div style="display:flex;gap:.8rem;margin-top:.4rem">
        <button type="button" class="btn btn-sec" onclick="modalKapat('m-islem')">İptal</button>
        <button type="submit" class="btn btn-success btn-full">Kaydet</button>
      </div>
    </form>
  </div>
</div>

<footer class="footer">
  <div class="footer-brand"><span class="brand-icon">₺</span> BudgetBuddy</div>
  <p>© 2026 BudgetBuddy</p>
</footer>

<script src="../assests/js/main.js"></script>
</body>
</html>
